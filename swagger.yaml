openapi: 3.0.0
info:
  title: Auth API
  version: 1.0.0
  description: Authentication API documentation
  contact:
    email: loinguyenlamthanh@gmail.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
tags:
  - name: Index
    description: Index related endpoints
  - name: Migrate
    description: Migrate related endpoints
  - name: AuditLog
    description: AuditLog related endpoints
  - name: Auth
    description: Auth related endpoints
  - name: Franchise
    description: Franchise related endpoints
  - name: Role
    description: Role related endpoints
  - name: User
    description: User related endpoints
  - name: UserFranchiseRole
    description: UserFranchiseRole related endpoints
  - name: CartItem
    description: CartItem related endpoints
  - name: Cart
    description: Cart related endpoints
  - name: Category Franchise
    description: Franchise menu category endpoints
  - name: Category
    description: Category related endpoints
  - name: Client
    description: Client related endpoints
  - name: Customer Auth
    description: Customer authentication related endpoints
  - name: CustomerFranchise
    description: CustomerFranchise related endpoints
  - name: Customer
    description: Customer related endpoints
  - name: Inventory
    description: Inventory related endpoints
  - name: Product Category Franchise
    description: Product Category Franchise related endpoints
  - name: Product Franchise
    description: Product Franchise related endpoints
  - name: Product
    description: Product related endpoints
paths:
  /:
    get:
      summary: Index API - check server status
      tags:
        - Index
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: API is running
  /api/roles/migrate:
    get:
      summary: Migrate default roles
      tags:
        - Role
      security:
        - bearerAuth: []
      description: >
        Initialize or migrate default system roles.

        This endpoint is typically used by admin during system setup or
        deployment.
      responses:
        '200':
          description: Roles migrated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: 'null'
                    example: null
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal server error
  /api/roles:
    get:
      summary: Get all roles
      tags:
        - Role
      security:
        - bearerAuth: []
      description: Retrieve all roles in the system.
      responses:
        '200':
          description: Get roles successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        code:
                          type: string
                          example: ADMIN
                        name:
                          type: string
                          example: Administrator
                        description:
                          type: string
                          example: System administrator role
                        scope:
                          type: string
                          enum:
                            - GLOBAL
                            - FRANCHISE
                          example: GLOBAL
                        created_at:
                          type: string
                          format: date-time
                          example: '2025-07-01T08:00:00Z'
                        updated_at:
                          type: string
                          format: date-time
                          example: '2025-07-01T08:00:00Z'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
